name: Deploy Vite Site to Pages

on:
  push:
    branches: ["main"] # 브랜치명이 master라면 수정하세요.
  workflow_dispatch: # 수동으로 배포를 실행할 수 있는 버튼을 추가합니다.

# GITHUB_TOKEN에 대한 권한 설정 (Pages 배포에 필수)
permissions:
  contents: read
  pages: write
  id-token: write

# 배포 프로세스 (Build -> Deploy)
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite 빌드 결과물이 저장되는 폴더

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
